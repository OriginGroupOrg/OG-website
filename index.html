<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta name="description" content="Origin Group — We build AI-powered sports coaching apps. Creators of Golf Coach and Beach Coach.">
	<title>Origin Group</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Sora:wght@600;700&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="styles.css">
</head>

<body>
	<div class="bg-glow bg-glow-1"></div>
	<div class="bg-glow bg-glow-2"></div>

	<main class="hero">
		<header class="brand">
			<span class="brand-mark">OG</span>
			<span class="brand-name">Origin&nbsp;Group</span>
		</header>

		<div class="center">
			<h1>AI coaching,<br>for every athlete.</h1>
			<p class="tagline">We design and build AI-powered sports coaching apps that help you master your game.</p>

			<div class="apps">
				<a class="app-card" href="https://www.golfingcoach.se" target="_blank" rel="noopener noreferrer">
					<span class="app-icon" aria-hidden="true">
						<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
							<path d="M12 3v13" />
							<path d="M12 3l7 3-7 3" />
							<circle cx="12" cy="19.5" r="1.8" />
						</svg>
					</span>
					<span class="app-text">
						<span class="app-name">Golf Coach</span>
						<span class="app-desc">AI swing analysis</span>
					</span>
					<span class="app-arrow" aria-hidden="true">→</span>
				</a>

				<a class="app-card" href="https://www.beachcoach.se" target="_blank" rel="noopener noreferrer">
					<span class="app-icon" aria-hidden="true">
						<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
							<circle cx="12" cy="12" r="9" />
							<path d="M12 3c-2.5 3-3.5 6.5-2.5 9.5" />
							<path d="M20.5 9.5c-3.5-1-7-0.5-9 2" />
							<path d="M7 19.5c1.5-3.5 4.5-5.5 8-5.5" />
						</svg>
					</span>
					<span class="app-text">
						<span class="app-name">Beach Coach</span>
						<span class="app-desc">Beach volleyball technique</span>
					</span>
					<span class="app-arrow" aria-hidden="true">→</span>
				</a>
			</div>
		</div>

		<footer class="footer">
			<a class="contact" href="mailto:team@origingroup.se">team@origingroup.se</a>
			<span class="dot" aria-hidden="true">·</span>
			<span>© 2026 Origin Group AB</span>
			<span class="dot" aria-hidden="true">·</span>
			<span>Sweden</span>
		</footer>
	</main>
</body>

</html>
