	<meta name="theme-color" content="#0b0e14">

<body>
	<div class="bg-glow bg-glow-1"></div>

			<span class="brand-mark"><img src="logo.png" alt="Origin Group logo"></span>

			<div class="apps">
				<a class="app-card app-card-golf" href="https://www.golfingcoach.se" target="_blank" rel="noopener noreferrer">

						<span class="app-name">Golf Coach</span>
						<span class="app-desc">AI swing analysis</span>
					</span>
					<span class="app-arrow" aria-hidden="true">→</span>

				<a class="app-card app-card-beach" href="https://www.beachcoach.se" target="_blank" rel="noopener noreferrer">

						<span class="app-name">Beach Coach</span>
						<span class="app-desc">Beach Volleyball</span>
					</span>

			<a class="contact" href="mailto:team@origingroup.se">team@origingroup.se</a>
